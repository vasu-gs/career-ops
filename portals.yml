# Portal Scanner Configuration — ZukoJobs
# Used by /career-ops scan to discover new offers automatically.
#
# Strategy (3 levels):
#   1. Playwright → careers_url of each company (real-time, reliable)
#   2. Greenhouse API → structured JSON (fast, Greenhouse-only)
#   3. WebSearch with site: filters (broad discovery, may be stale)
#
# IMPORTANT: Each company in tracked_companies MUST have careers_url.

# -- Title filter --
# The scanner uses these keywords to decide if a title is relevant.
# At least 1 positive must match AND 0 negatives must match (case-insensitive).

title_filter:
  positive:
    - Software Engineer
    - AI Engineer
    - ML Engineer
    - Machine Learning
    - Forward Deployed
    - Solutions Engineer
    - Product Manager
    - Program Manager
    - Applied AI
    - LLM
    - Platform Engineer
    # -- Also match broader AI/ML signals --
    - AI
    - ML
    - LLMOps
    - MLOps
    - Voice AI
    - Conversational AI
    - Speech
    - Agent
    - Agentic
    - GenAI
    - NLP
    - Solutions Architect
    - Customer Engineer
    - Integration Engineer
  negative:
    - Intern
    - Junior
    - Associate
    - Contractor
    - Part-time
  seniority_boost:
    - Senior
    - Staff
    - Principal
    - Lead
    - Head
    - Director

# -- Search queries --
# Each query triggers a WebSearch. Use site: to filter by portal.

search_queries:
  # -- Ashby --
  - name: Ashby — AI Engineer
    query: 'site:jobs.ashbyhq.com "AI Engineer" OR "LLM Engineer" OR "Forward Deployed" remote'
    enabled: true

  - name: Ashby — Solutions Engineer & Architect
    query: 'site:jobs.ashbyhq.com "Solutions Engineer" OR "Solutions Architect" AI remote'
    enabled: true

  - name: Ashby — Platform Engineer
    query: 'site:jobs.ashbyhq.com "Platform Engineer" OR "ML Engineer" remote'
    enabled: true

  - name: Ashby — Product Manager AI
    query: 'site:jobs.ashbyhq.com "Product Manager" AI OR LLM remote'
    enabled: true

  # -- Greenhouse --
  - name: Greenhouse — AI & ML Engineer
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "AI Engineer" OR "ML Engineer" OR "Machine Learning" remote'
    enabled: true

  - name: Greenhouse — Forward Deployed & Solutions
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Forward Deployed" OR "Solutions Engineer" OR "Applied AI" remote'
    enabled: true

  - name: Greenhouse — Software Engineer AI
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Software Engineer" LLM OR "Applied AI" OR "AI Platform" remote'
    enabled: true

  - name: Greenhouse — Platform Engineer
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Platform Engineer" AI OR ML remote'
    enabled: true

  # -- Lever --
  - name: Lever — AI Engineer & FDE
    query: 'site:jobs.lever.co "AI Engineer" OR "Forward Deployed" OR "ML Engineer" remote'
    enabled: true

  - name: Lever — Solutions & Platform
    query: 'site:jobs.lever.co "Solutions Engineer" OR "Platform Engineer" AI remote'
    enabled: true

  # -- Wellfound (startups) --
  - name: Wellfound — AI Roles
    query: 'site:wellfound.com "AI Engineer" OR "ML Engineer" OR "LLM" OR "Applied AI" remote'
    enabled: true

  # -- FDE specific (cross-portal) --
  - name: FDE & Deployed Engineer — All portals
    query: '"Forward Deployed Engineer" OR "Deployed Engineer" AI site:job-boards.greenhouse.io OR site:jobs.ashbyhq.com OR site:jobs.lever.co'
    enabled: true

